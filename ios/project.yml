name: TotoApp
options:
  bundleIdPrefix: com.chintheman
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "" # fill in your Apple Developer Team ID once enrolled

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.20.0

targets:
  TotoApp:
    type: application
    platform: iOS
    sources:
      - path: TotoApp
        excludes:
          - "**/*.md"
    resources:
      - path: TotoApp/Resources
    dependencies:
      - package: Supabase
        product: Supabase
    info:
      path: TotoApp/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleDisplayName: TOTO
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chintheman.toto
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: true

  TotoAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TotoAppTests
    dependencies:
      - target: TotoApp

schemes:
  TotoApp:
    build:
      targets:
        TotoApp: all
        TotoAppTests: [test]
    test:
      targets:
        - TotoAppTests
    run:
      config: Debug
